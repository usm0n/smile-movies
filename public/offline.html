<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smile Movies Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: radial-gradient(circle at top, rgba(255, 216, 77, 0.12), transparent 24%), #050913;
        color: #f7f8fb;
      }

      main {
        max-width: 520px;
        padding: 32px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      h1 {
        margin-top: 0;
      }

      p {
        color: rgba(247, 248, 251, 0.8);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Smile Movies is offline</h1>
      <p>The app shell is installed, but this page needs a connection to load fresh data. Reconnect and try again.</p>
    </main>
  </body>
</html>
